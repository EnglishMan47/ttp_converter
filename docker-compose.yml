services:
  tiff2pdf:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - models-cache:/root/.cache   # веса моделей (EasyOCR, Chandra GGUF)
      - neural:/neural              # runtime нейросетевого движка (llama.cpp)
    # Блок ниже включает доступ контейнера к видеокарте NVIDIA:
    # удалите символы «# » в начале следующих семи строк (пошаговая
    # инструкция — в README, раздел «Видеокарта NVIDIA»). Без
    # видеокарты ничего менять не нужно: оба движка ставятся
    # автоматически, нейросетевой — в CPU-варианте.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    restart: unless-stopped

volumes:
  models-cache:
  neural:
